<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仁迈 - 智能社交关系分析与管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #E8614D 0%, #F5937F 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            color: white;
            padding: 20px;
        }
        .logo {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .logo svg {
            width: 64px;
            height: 64px;
            fill: #E8614D;
        }
        h1 {
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 8px;
            margin-bottom: 16px;
        }
        .subtitle {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 60px;
        }
        .version {
            font-size: 14px;
            opacity: 0.7;
        }
        .loading {
            display: none;
        }
        .loading.show {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 40px;
        }
        .loading.show span {
        .loading span {
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .loading.show span:nth-child(1) { animation-delay: -0.32s; }
        .loading.show span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .status {
            margin-top: 40px;
            padding: 20px 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
        .status-text {
            font-size: 16px;
        }
        .api-info {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            text-align: left;
            max-width: 400px;
        }
        .api-info h3 {
            font-size: 14px;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        .api-info code {
            display: block;
            font-size: 13px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 6px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
            </svg>
        </div>
        <h1>仁迈</h1>
        <p class="subtitle">智能社交关系分析与管理平台</p>
        
        <div class="status">
            <p class="status-text">正在连接服务...</p>
        </div>
        
        <div class="api-info">
            <h3>API 端点</h3>
            <code id="api-url">https://api.renmai.com/v1</code>
        </div>
        
        <div class="loading show">
            <span></span>
            <span></span>
            <span></span>
        </div>
        
        <p class="version">V1.0.0</p>
    </div>

    <script>
        // 模拟API响应
        const API_BASE = 'https://api.renmai.com/v1';
        
        document.getElementById('api-url').textContent = API_BASE;
        
        // 显示加载动画
        document.querySelector('.loading').classList.add('show');
        
        // 模拟加载完成
        setTimeout(() => {
            document.querySelector('.status-text').textContent = '✓ 服务已就绪';
            document.querySelector('.loading').classList.remove('show');
        }, 1500);
        
        // 模拟API调用
        const mockApi = {
            // 用户登录
            login: async (phone, password) => {
                return {
                    code: 200,
                    data: {
                        token: 'mock_token_' + Date.now(),
                        user: {
                            id: '1',
                            phone: phone,
                            nickname: '测试用户',
                            avatar: null,
                            bio: null,
                            created_at: new Date().toISOString()
                        }
                    }
                };
            },
            
            // 获取联系人列表
            getContacts: async () => {
                return {
                    code: 200,
                    data: [
                        {
                            id: '1',
                            name: '张三',
                            remark: '老张',
                            group: '朋友',
                            is_starred: true,
                            created_at: new Date().toISOString(),
                            updated_at: new Date().toISOString()
                        },
                        {
                            id: '2',
                            name: '李四',
                            group: '同事',
                            is_starred: false,
                            created_at: new Date().toISOString(),
                            updated_at: new Date().toISOString()
                        },
                        {
                            id: '3',
                            name: '王五',
                            group: '家人',
                            is_starred: true,
                            created_at: new Date().toISOString(),
                            updated_at: new Date().toISOString()
                        }
                    ]
                };
            },
            
            // 获取关系分析
            getAnalysis: async () => {
                return {
                    code: 200,
                    data: {
                        total: 128,
                        family: 12,
                        friend: 56,
                        colleague: 40,
                        acquaintance: 20
                    }
                };
            }
        };
        
        // 将mockApi暴露到全局
        window.renmaiApi = mockApi;
        
        console.log('仁迈 API 模拟服务已启动');
        console.log('API Base:', API_BASE);
    </script>
</body>
</html>
